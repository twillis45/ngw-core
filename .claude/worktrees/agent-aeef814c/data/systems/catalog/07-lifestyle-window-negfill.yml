id: lifestyle-window-negfill
name: Lifestyle Window (Neg Fill)
pack: pro
rank: 7

taxonomy-refs:
  mood: lifestyle
  environment: indoor-window
  gear-profile: natural-window
  modifier-family: none

shadow:
  expected:
    pattern: window
    notes:
      - Directional soft shadow; gentle falloff.
      - Negative fill adds shape.

diagram-defaults:
  subject:
    position: near-window
  camera:
    angle: eye-level
    lens: standard

lights:
  - role: key
    name: Window
    angle-deg: 60.0
    distance-ft: "N/A"
    height: window height
    modifier: natural
    notes:
      - Turn subject for cheek definition.

  - role: fill
    name: Negative Fill
    angle-deg: -120.0
    distance-ft: "1–3"
    height: face height
    modifier: black flag/v-flat
    notes:
      - Controls spill for more contrast.
