id: lowkey-split
name: Low-Key Split (Gridded Key)
pack: pro
rank: 5

taxonomy-refs:
  mood: dramatic
  environment: studio
  gear-profile: strobe-mono
  modifier-family: grid

shadow:
  expected:
    pattern: split
    notes:
      - Face split: one side lit, one side falls to shadow.
      - Harder edge if grid is tight.

diagram-defaults:
  subject:
    position: center
  camera:
    angle: eye-level
    lens: short-tele

lights:
  - role: key
    name: Key
    angle-deg: 90.0
    distance-ft: "5–8"
    height: slightly above eye line
    modifier: reflector + grid
    notes:
      - Place exactly 90° for split; tweak forward if too harsh.

  - role: fill
    name: Negative Fill
    angle-deg: -90.0
    distance-ft: "1–2"
    height: face height
    modifier: black flag/v-flat
    notes:
      - Deepens shadow side.
