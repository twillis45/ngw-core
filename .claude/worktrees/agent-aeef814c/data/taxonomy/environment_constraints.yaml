version: "1.0"
environment_constraints:
  ceiling:
    - id: low_ceiling
      description: Under 8 ft. Limits overhead key and boom placement. Butterfly and clamshell patterns require seated subjects.
      typical_range_ft: "7-8"
      impact_on_setup: Cannot boom key above subject standing; overhead patterns compromised; hair lights limited

    - id: standard_ceiling
      description: 8-10 ft. Accommodates most portrait setups including boomed key lights.
      typical_range_ft: "8-10"
      impact_on_setup: All standard patterns work. Boom clearance adequate for standing subjects.

    - id: tall_ceiling
      description: Over 10 ft. Full flexibility for overhead, boom, and multi-level lighting setups.
      typical_range_ft: "10+"
      impact_on_setup: No ceiling constraints. All patterns and modifiers available.

  room_size:
    - id: small_room
      description: Under 150 sq ft. Tight space limits modifier size, light-to-subject distance, and background separation.
      typical_range_sqft: "< 150"
      impact_on_setup: Max modifier ~90cm. Key distance 2-3 ft. Background separation limited to 4-5 ft. Wall bounce may contaminate shadows.

    - id: medium_room
      description: 150-400 sq ft. Accommodates 2-3 light setups with moderate background separation.
      typical_range_sqft: "150-400"
      impact_on_setup: Standard portrait setups work. 5-8 ft background separation achievable. Large modifiers possible.

    - id: large_studio
      description: Over 400 sq ft. Full studio capability with maximum background separation and modifier options.
      typical_range_sqft: "400+"
      impact_on_setup: No space constraints. 8-12 ft background separation. Full high-key sweeps. Multiple light setups.

  conditions:
    - id: window_available
      description: Natural window light present and usable. Can serve as key or fill source.
      impact_on_setup: Enables Vermeer-style natural light setups. Must manage mixed color temperatures if combining with flash.

    - id: battery_required
      description: No AC power available. All lights must run on battery.
      impact_on_setup: Limits to speedlights, battery-powered COBs, LED panels. Strobe packs and AC monolights unavailable.

    - id: portable_required
      description: Setup must be transported and assembled quickly. Weight and case size matter.
      impact_on_setup: Favors speedlights, collapsible modifiers, umbrella-based setups. Large softboxes and heavy stands impractical.

    - id: boom_possible
      description: Sufficient ceiling clearance and stand availability for boom arm placement.
      impact_on_setup: Enables butterfly, clamshell, and overhead key patterns. Required for centered-key setups.

    - id: limited_depth
      description: Room depth under 12 ft from background to camera position.
      impact_on_setup: Reduces background separation. High-key setups compromised. Subject closer to background increases spill and shadow issues.

    - id: limited_width
      description: Room width under 10 ft. Side-lit patterns and multi-light setups constrained.
      impact_on_setup: Rim lights may hit walls. Side key positions limited. V-flats may not fit alongside subject.
