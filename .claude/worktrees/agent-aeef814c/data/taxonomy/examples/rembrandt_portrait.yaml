identity:
  setup_id: rembrandt_portrait_v1
  setup_name: Rembrandt Portrait
  use_case: portrait
  visual_intent: dramatic
  pattern_family: rembrandt
  tags:
    - portrait
    - headshot
    - corporate
    - cinematic
    - editorial
    - dramatic

subject_fit:
  subject_types:
    - male_portrait
    - female_portrait
    - seated_portrait
  skin_or_surface_notes:
    - triangle_on_shadow_cheek_is_the_diagnostic
    - increase_fill_ratio_half_stop_for_dark_skin
    - use_larger_modifier_for_softer_wrap_on_dark_skin
  pose_assumptions:
    - turned_30_to_45_degrees_toward_key
    - chin_slightly_down
    - shadow_side_cheek_faces_camera

environment_fit:
  minimum_ceiling_height_ft: 9
  recommended_ceiling_height_ft: 10
  minimum_room_width_ft: 10
  minimum_room_depth_ft: 14
  indoor_outdoor_fit:
    - indoor
    - studio
  portability: low
  power_requirements: medium
  environment_tags:
    - standard_ceiling
    - medium_room
    - boom_possible

light_architecture:
  key_source:
    role: key
    modifier_family: medium_softbox
    angle_deg: 45
    height_relative_to_subject: slightly_above_forehead
    distance_ft:
      min: 3.5
      max: 5.0
    feather_direction: near_edge_past_subject
  fill_source:
    role: fill
    modifier_family: reflector
    position: opposite_key_near_camera_axis
    ratio_to_key_stops: -1.5
  rim_sources:
    - role: rim
      modifier_family: grid_spot
      position: behind_subject_opposite_key
      angle_deg: 135
      ratio_to_key_stops: -0.5
  background_source: null
  negative_fill: null
  bounce: null

camera_architecture:
  lens_range_mm:
    min: 85
    max: 135
  camera_height_relative_to_subject: eye_level
  camera_angle: straight_on_or_slight_3_4_to_shadow_side
  camera_distance_ft:
    min: 8
    max: 10

distance_references:
  key_to_subject_ft:
    min: 3.5
    max: 5.0
  fill_to_subject_ft:
    min: 4.0
    max: 6.0
  rim_to_subject_ft:
    min: 5.0
    max: 7.0
  subject_to_background_ft:
    min: 5
    max: 8
  camera_to_subject_ft:
    min: 8
    max: 10
  background_light_to_background_ft: null

expected_result:
  shadow_pattern: rembrandt_triangle_on_shadow_cheek
  contrast_profile: medium_to_high
  catchlight_style: single_at_10_to_11_oclock
  background_relationship: dark_even_no_visible_spill
  visual_notes:
    - triangle_of_light_on_shadow_side_cheek
    - nose_shadow_connects_to_cheek_shadow
    - gradual_falloff_across_nose_bridge
    - jawline_definition_on_key_side

diagnostics:
  common_failure_modes:
    - missing_rembrandt_triangle
    - triangle_too_large
    - raccoon_eyes
    - face_too_flat
    - rim_too_hot
    - no_subject_separation
    - background_too_bright

substitutions:
  modifier_alternatives:
    - primary: medium_softbox
      alternatives:
        - umbrella_silver
        - large_octa
  gear_alternatives:
    - primary: strobe_mono
      alternatives:
        - speedlight
        - led_cob
  adaptation_variants:
    - ideal_setup
    - low_ceiling_version
    - small_room_version
    - one_light_version
    - two_light_version
    - speedlight_version

reliability:
  rule_confidence: 92
  reliability_label: very_reliable
  field_verified: false
  verification_count: 0
  notes:
    - most_forgiving_dramatic_pattern
    - small_errors_still_produce_professional_result
    - works_in_nearly_every_portrait_studio
