version: "1.0"
lighting_patterns:
  portrait:
    - id: butterfly
      description: Centered key directly above camera axis creates symmetrical butterfly shadow under nose. Paramount/Hollywood glamour classic.
      key_angle_range: "0 deg (centered)"
      key_height: above_forehead
      fill_approach: clamshell reflector below chin
      shadow_signature: Small symmetrical butterfly shape directly under nose
      catchlight_position: "12 o'clock (centered)"
      master_ref: butterfly_beauty

    - id: loop
      description: Key at 25-35 degrees off axis creates a small loop-shaped nose shadow. Does NOT connect to cheek shadow. Most universally flattering pattern.
      key_angle_range: "25-35 deg"
      key_height: slightly_above_eye_level
      fill_approach: reflector or fill light near camera axis at -1 to -1.5 stops
      shadow_signature: Small loop shadow beside nose, not touching cheek
      catchlight_position: "10-11 or 1-2 o'clock"
      master_ref: loop_lighting

    - id: rembrandt
      description: Key at 40-55 degrees creates diagnostic triangle of light on shadow cheek. Named for the Dutch master's signature. The most-booked dramatic pattern.
      key_angle_range: "40-55 deg"
      key_height: slightly_above_forehead
      fill_approach: reflector or -1.5 to -3 stops fill depending on drama level
      shadow_signature: Triangle of light on shadow cheek, nose shadow connects to cheek shadow
      catchlight_position: "10-11 or 1-2 o'clock"
      master_ref: rembrandt_portrait

    - id: split
      description: Key at 90 degrees lights exactly half the face. Maximum drama. Hard-edged shadow down center of face.
      key_angle_range: "85-95 deg"
      key_height: at_eye_level
      fill_approach: minimal or none (-3 stops or no fill)
      shadow_signature: Sharp shadow line down center of face, one half completely lit
      catchlight_position: "9 or 3 o'clock"
      master_ref: null

    - id: broad
      description: Key illuminates the side of the face turned toward camera. Widens the apparent face. Less common in modern portraiture.
      key_angle_range: "30-45 deg (camera side)"
      key_height: slightly_above_eye_level
      fill_approach: moderate fill on shadow side
      shadow_signature: Shadow falls on the narrow side of face (away from camera)
      catchlight_position: varies
      master_ref: null

    - id: short
      description: Key illuminates the narrow side of face (turned away from camera). Slims the face, adds dimension. Preferred for heavier subjects.
      key_angle_range: "30-45 deg (far side)"
      key_height: slightly_above_eye_level
      fill_approach: controlled fill to maintain dimension
      shadow_signature: Shadow on the broad side of face (toward camera)
      catchlight_position: varies
      master_ref: null

    - id: clamshell
      description: Key above + fill below creates a clamshell of light around the face. The beauty industry standard for cosmetics and skin care.
      key_angle_range: "0 deg (centered)"
      key_height: above_forehead
      fill_approach: reflector or fill directly below at -1 to -1.5 stops
      shadow_signature: Minimal — soft under-nose shadow, opened by fill. Symmetrical.
      catchlight_position: "12 o'clock upper + 6 o'clock lower (dual)"
      master_ref: butterfly_beauty

    - id: flat_frontal
      description: Key positioned at or near camera axis for nearly shadowless illumination. Used for high-key corporate and e-commerce.
      key_angle_range: "0-15 deg"
      key_height: at_eye_level
      fill_approach: strong fill at -0.5 stops or equal power
      shadow_signature: Nearly shadowless face. Minimal dimension.
      catchlight_position: "11-1 o'clock"
      master_ref: avedon_high_key

    - id: hard_frontal
      description: Hard, undiffused source at or near camera axis. Strong specular texture. Editorial and fashion.
      key_angle_range: "0-20 deg"
      key_height: varies
      fill_approach: none or minimal
      shadow_signature: Hard-edged shadows cast directly behind subject features
      catchlight_position: varies
      master_ref: null

    - id: side_key
      description: Key placed at 60-90 degrees creating strong directional modeling. Split or near-split lighting.
      key_angle_range: "60-90 deg"
      key_height: above_forehead
      fill_approach: minimal or negative fill on shadow side
      shadow_signature: Strong modeling across face with deep shadow side
      catchlight_position: "9-10 or 2-3 o'clock"
      master_ref: caravaggio_chiaroscuro

    - id: top_light_dominant
      description: Primary source from directly above. Strong forehead illumination with deep eye sockets. Cinematic.
      key_angle_range: "0 deg horizontal, steep vertical"
      key_height: directly_overhead
      fill_approach: bounce from below or low fill
      shadow_signature: Deep eye sockets, strong downward shadows on all features
      catchlight_position: "12 o'clock (top of iris)"
      master_ref: null

    - id: rim_dominant
      description: Rim or backlight is the primary source. Subject is silhouetted or edge-lit. Dramatic separation.
      key_angle_range: "120-180 deg (behind subject)"
      key_height: above_subject
      fill_approach: very subtle front fill or ambient only
      shadow_signature: Subject mostly in shadow, bright edges and hair
      catchlight_position: may be absent
      master_ref: null

  product:
    - id: top_soft
      description: Large soft source from above for even, shadowless product illumination
      modifier_preference: diffusion_panel
      angle_sensitivity: low

    - id: side_gradient
      description: Side-positioned source creating gradient across product surface for dimension
      modifier_preference: stripbox
      angle_sensitivity: medium

    - id: wrap_diffusion
      description: Large diffusion surrounding product for soft, even wrap-around illumination
      modifier_preference: diffusion_panel
      angle_sensitivity: low

    - id: strip_reflection
      description: Narrow strip sources creating controlled reflection lines on glossy surfaces
      modifier_preference: stripbox
      angle_sensitivity: very_high

    - id: edge_specular
      description: Hard-edged specular highlights defining product shape and material
      modifier_preference: grid_spot
      angle_sensitivity: very_high

    - id: silhouette
      description: Backlit product creating outline shape against bright background
      modifier_preference: bare_bulb
      angle_sensitivity: medium

    - id: high_key_sweep
      description: White sweep background with even product illumination for e-commerce
      modifier_preference: softbox_rect
      angle_sensitivity: low

    - id: dark_field
      description: Dark background with edge lighting to define transparent or reflective product shape
      modifier_preference: stripbox
      angle_sensitivity: high

    - id: light_field
      description: Bright background illumination shining through transparent products (glass, liquid)
      modifier_preference: diffusion_panel
      angle_sensitivity: medium
