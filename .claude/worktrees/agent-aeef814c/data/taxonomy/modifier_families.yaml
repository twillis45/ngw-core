version: "1.0"
modifier_families:
  - id: beauty_dish
    description: Parabolic dish with central deflector. Light quality between soft and hard — contrasty but smooth falloff. Signature beauty/fashion look.
    size_class: medium
    quality_tag: medium_hard
    best_for: [beauty, editorial, portrait]
    avoid_for: [product, e_commerce]
    catchlight_shape: round_defined

  - id: small_softbox
    description: Fabric box diffuser under 60cm. Tighter coverage, slightly harder than large sources. Good for headshot key or accent.
    size_class: small
    quality_tag: medium_soft
    best_for: [headshot, corporate, portrait]
    avoid_for: [full_body_fashion, group_portrait]
    catchlight_shape: rectangular_small

  - id: medium_softbox
    description: Rectangular softbox 60-120cm. Workhorse portrait modifier. Even soft light, rectangular catchlights.
    size_class: medium
    quality_tag: soft
    best_for: [portrait, headshot, corporate, beauty]
    avoid_for: []
    catchlight_shape: rectangular

  - id: large_octa
    description: Octagonal softbox 120cm+. Broad wrap-around light with round catchlights. Preferred for beauty and headshots.
    size_class: large
    quality_tag: very_soft
    best_for: [beauty, portrait, headshot, fashion]
    avoid_for: [small_room]
    catchlight_shape: octagonal

  - id: stripbox
    description: Narrow rectangular softbox (15-35cm wide). Used for rim, hair, and accent lighting. Creates thin reflection lines on product.
    size_class: narrow
    quality_tag: directional_soft
    best_for: [rim_lighting, hair_lighting, product, fashion]
    avoid_for: [key_light_beauty]
    catchlight_shape: rectangular_thin

  - id: umbrella_silver
    description: Reflective silver umbrella bouncing light toward subject. Moderate spread, specular quality. Affordable and portable.
    size_class: medium_to_large
    quality_tag: medium_specular
    best_for: [portrait, corporate, on_location]
    avoid_for: [dark_skin_key, beauty_close_up]
    catchlight_shape: round_broad

  - id: umbrella_white
    description: Shoot-through or reflective white umbrella. Broadest, softest diffusion. Some backward spill.
    size_class: medium_to_large
    quality_tag: very_soft
    best_for: [corporate, group_portrait, on_location, beginner]
    avoid_for: [controlled_spill_setups]
    catchlight_shape: round_broad

  - id: reflector
    description: Passive bounce surface — silver, white, or gold. Not a light source. Used for fill, never key.
    size_class: varies
    quality_tag: reflected
    best_for: [fill, clamshell_fill, window_fill, outdoor_fill]
    avoid_for: [key_light]
    catchlight_shape: varies

  - id: grid_spot
    description: Metal or fabric honeycomb narrowing beam to 10-40 degrees. Controls spill without changing light quality. Stackable onto other modifiers.
    size_class: accessory
    quality_tag: controlled
    best_for: [rim_lighting, hair_lighting, accent, low_key, product_accent]
    avoid_for: [key_on_dark_skin]
    catchlight_shape: small_defined

  - id: bare_bulb
    description: Raw light source with no modifier. Hardest light quality, maximum output. Deliberate use for editorial or dramatic work.
    size_class: point_source
    quality_tag: hard
    best_for: [editorial, low_key, cinematic, background_light]
    avoid_for: [beauty, corporate, dark_skin_key]
    catchlight_shape: small_point

  - id: fresnel
    description: Focusable lens creating defined beam with adjustable spread (spot to flood). Hard, cinematic light quality.
    size_class: medium
    quality_tag: hard_focused
    best_for: [cinematic, editorial, theatrical, low_key]
    avoid_for: [beauty, corporate]
    catchlight_shape: small_round

  - id: tube_light
    description: Cylindrical LED tube with RGB or bi-color. Used for creative rim/accent, practical effects, edge lighting.
    size_class: linear
    quality_tag: medium_soft_linear
    best_for: [accent, rim_lighting, cinematic, creator]
    avoid_for: [key_light, beauty]
    catchlight_shape: linear

  - id: panel
    description: Flat LED panel, bi-color or RGB. Continuous WYSIWYG preview. Good for video and subjects uncomfortable with flash.
    size_class: medium
    quality_tag: medium_soft
    best_for: [interview, creator, video, corporate, natural]
    avoid_for: [high_power_needed]
    catchlight_shape: rectangular

  - id: diffusion_frame
    description: Large fabric frame (4x4 ft to 6x6 ft) placed between source and subject. Converts any hard source into a large soft source.
    size_class: very_large
    quality_tag: very_soft
    best_for: [natural, vermeer_style, group_portrait, mixed_skin_tones]
    avoid_for: [small_room, outdoor_wind]
    catchlight_shape: rectangular_large

  - id: negative_fill
    description: Black surface (v-flat, flag, fabric) absorbing light to deepen shadows. Not a light source — a light subtractor.
    size_class: varies
    quality_tag: subtractive
    best_for: [dramatic, cinematic, low_key, rembrandt, chiaroscuro]
    avoid_for: [high_key, beauty_flat]
    catchlight_shape: n_a

  - id: bounce_source
    description: White ceiling, wall, or large white surface used as a secondary bounce source. Creates ambient fill.
    size_class: environmental
    quality_tag: very_soft_ambient
    best_for: [natural, on_location, event, group_portrait]
    avoid_for: [controlled_ratio_setups, low_key]
    catchlight_shape: ambient
