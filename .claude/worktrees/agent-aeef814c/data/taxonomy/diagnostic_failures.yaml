version: "1.0"
diagnostic_failures:
  # ── Existing entries (enriched) ──────────────────────────────────────

  - id: face_too_flat
    symptoms:
      - weak facial shape
      - low cheekbone definition
      - minimal contrast across face
    likely_causes:
      - fill_too_strong
      - key_too_frontal
      - source_too_large_and_close
    quick_fixes:
      - reduce_fill
      - move_fill_farther
      - move_key_off_axis
      - add_negative_fill
    patterns_affected: [loop, rembrandt, butterfly, clamshell]

  - id: nose_shadow_too_long
    symptoms:
      - shadow extends toward lip
      - butterfly or loop pattern looks too dramatic
    likely_causes:
      - key_too_high
      - key_too_lateral
      - subject_chin_too_low
    quick_fixes:
      - lower_key
      - move_key_forward
      - adjust_subject_chin
    patterns_affected: [butterfly, loop, rembrandt]

  - id: raccoon_eyes
    symptoms:
      - deep eye sockets
      - dark shadows under brow
    likely_causes:
      - key_too_high
      - insufficient_fill
    quick_fixes:
      - lower_key
      - add_fill
      - bring_fill_closer
    patterns_affected: [butterfly, clamshell, rembrandt]

  - id: rim_too_hot
    symptoms:
      - blown edge highlights
      - shoulder or hair clipping
    likely_causes:
      - rim_too_close
      - rim_power_too_high
      - rim_not_feathered
    quick_fixes:
      - move_rim_farther
      - reduce_rim_power
      - feather_rim
    patterns_affected: [rembrandt, loop, split]

  - id: no_subject_separation
    symptoms:
      - subject blends into background
      - weak edge definition
    likely_causes:
      - subject_too_close_to_background
      - no_rim_or_hair_light
      - background_too_bright
    quick_fixes:
      - move_subject_forward
      - add_rim_light
      - reduce_background_exposure
    patterns_affected: [all]

  - id: background_too_bright
    symptoms:
      - background competes with subject
      - reduced subject emphasis
    likely_causes:
      - subject_too_close_to_background
      - excessive_spill
      - background_light_too_strong
    quick_fixes:
      - move_subject_farther_from_background
      - flag_spill
      - lower_background_power
    patterns_affected: [rembrandt, side_key, split]

  - id: catchlight_too_high
    symptoms:
      - catchlight near top of iris
      - unnatural eye highlight placement
    likely_causes:
      - key_too_high
    quick_fixes:
      - lower_key_slightly
    patterns_affected: [butterfly, clamshell, loop]

  - id: shadow_too_hard
    symptoms:
      - abrupt edge transitions
      - harsh facial shadow lines
    likely_causes:
      - source_too_small
      - source_too_far
    quick_fixes:
      - increase_source_size
      - move_light_closer
    patterns_affected: [all]

  - id: reflection_too_broad
    symptoms:
      - uncontrolled highlight spread
      - loss of product shape
    likely_causes:
      - source_too_large
      - angle_family_too_wide
    quick_fixes:
      - reduce_modifier_size
      - narrow_reflection_family
    patterns_affected: [product_only]

  - id: reflection_too_narrow
    symptoms:
      - dead-looking product edge
      - insufficient highlight shape
    likely_causes:
      - source_too_small
      - poor_reflection_angle
    quick_fixes:
      - widen_source
      - adjust_angle_of_incidence
    patterns_affected: [product_only]

  # ── New entries from patterns.py + coaching.js + masterLighting.js ──

  - id: double_background_shadow
    symptoms:
      - two separate shadows visible on background behind subject
      - messy or distracting background
    likely_causes:
      - subject_too_close_to_wall
      - multiple_lights_casting_separate_shadows
    quick_fixes:
      - move_subject_4_plus_ft_from_background
      - flag_key_to_prevent_background_spill
      - reduce_to_single_key_shadow
    patterns_affected: [loop, rembrandt, butterfly]

  - id: missing_rembrandt_triangle
    symptoms:
      - no triangle of light on shadow cheek
      - face appears flat despite dramatic intent
    likely_causes:
      - key_too_frontal_toward_camera_axis
      - fill_too_strong_washing_out_shadow
      - excessive_room_bounce
    quick_fixes:
      - move_key_further_to_side_until_triangle_appears_40_to_50_degrees
      - reduce_fill_power_or_move_fill_back
      - add_negative_fill_to_block_bounce
    patterns_affected: [rembrandt]

  - id: triangle_too_large
    symptoms:
      - half the face lit instead of just a small triangle
      - approaching split lighting unintentionally
    likely_causes:
      - key_too_far_to_the_side_over_60_degrees
      - fill_too_weak_on_shadow_side
    quick_fixes:
      - move_key_forward_10_to_15_degrees_toward_camera_axis
      - ensure_slight_fill_to_define_triangle_boundary
    patterns_affected: [rembrandt]

  - id: chin_shadow_too_heavy
    symptoms:
      - dark shadow under chin dominates lower face
      - unflattering jawline rendering
    likely_causes:
      - key_too_high_without_clamshell_fill
      - fill_reflector_too_far_below_chin
    quick_fixes:
      - add_reflector_at_chin_level
      - lower_key_slightly
      - bring_fill_reflector_closer
    patterns_affected: [butterfly, clamshell]

  - id: double_catchlights
    symptoms:
      - two catchlights visible in each eye
      - distracting double-headlight look
    likely_causes:
      - fill_too_strong_creating_visible_second_catchlight
      - fill_placed_too_far_from_camera_axis
      - rim_light_reaching_the_eyes
    quick_fixes:
      - reduce_fill_power_to_minus_2_stops_or_more
      - move_fill_to_camera_axis
      - flag_rim_from_hitting_the_eyes
    patterns_affected: [clamshell, loop, flat_frontal]

  - id: skin_too_waxy
    symptoms:
      - skin appears artificial or plastic
      - loss of natural skin texture
      - flat tonal range across face
    likely_causes:
      - all_lights_too_close_to_subject
      - excessive_diffusion_from_multiple_soft_sources
      - over_lit_with_no_shadow_dimension
    quick_fixes:
      - move_all_lights_back_6_to_12_inches
      - reduce_one_fill_source
      - add_subtle_negative_fill_at_sides
    patterns_affected: [clamshell, flat_frontal]

  - id: color_cast_mixed
    symptoms:
      - warm and cool tones competing on subject face
      - unnatural skin color rendering
      - white balance appears wrong regardless of setting
    likely_causes:
      - mixing_flash_and_tungsten_ambient
      - mixing_flash_and_window_daylight_without_gel
      - led_sources_with_different_color_temperatures
    quick_fixes:
      - gel_strobe_with_quarter_cto_to_match_ambient
      - kill_ambient_by_increasing_shutter_speed
      - set_all_sources_to_same_kelvin
    patterns_affected: [all]

  - id: uneven_triangle_catchlights
    symptoms:
      - triangle catchlight pattern has one catchlight larger than others
      - asymmetric eye highlights in triangle setup
    likely_causes:
      - lights_at_different_distances_from_subject
      - one_light_higher_power_than_others
    quick_fixes:
      - measure_distances_from_each_light_to_subject_match_them
      - meter_each_light_independently_and_balance_power
    patterns_affected: [triangle]

  - id: glasses_glare
    symptoms:
      - bright reflection on glasses lens surface
      - subject eyes obscured by glare
    likely_causes:
      - key_reflection_hitting_lens_surface_directly
      - overhead_centered_key_guarantees_glare
    quick_fixes:
      - raise_key_6_inches
      - angle_subject_chin_down_5_degrees
      - move_key_5_degrees_wider
      - switch_from_butterfly_to_loop_pattern
    patterns_affected: [butterfly, clamshell, flat_frontal]

  - id: lens_flare_from_background
    symptoms:
      - haze or flare across image
      - reduced contrast on subject
      - visible light contamination from background
    likely_causes:
      - background_lights_visible_to_lens
      - subject_too_close_to_overlit_background
    quick_fixes:
      - flag_background_lights_from_camera
      - use_lens_hood
      - move_subject_further_from_background
    patterns_affected: [flat_frontal]
