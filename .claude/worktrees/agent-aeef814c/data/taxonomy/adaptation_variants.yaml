version: "1.0"
adaptation_variants:
  - id: ideal_setup
    description: Full recommended setup with all specified lights, modifiers, and distances. No compromises.
    constraint_addressed: none
    typical_tradeoffs: []

  - id: low_ceiling_version
    description: Modified for rooms under 8 ft ceiling. Key lowered, subject seated, boom replaced with stand.
    constraint_addressed: low_ceiling
    typical_tradeoffs:
      - Key height limited — butterfly and clamshell patterns may lose their overhead shadow signature
      - Subject often needs to sit on a low stool to create clearance
      - Hair/rim lights may clip the ceiling

  - id: small_room_version
    description: Modified for rooms under 150 sq ft. Closer distances, smaller modifiers, reduced background separation.
    constraint_addressed: small_room
    typical_tradeoffs:
      - Modifier size limited to under 90cm — softer options unavailable
      - Background separation reduced to 4-5 ft — spill and shadow on background likely
      - Wall bounce may contaminate shadows — add negative fill if possible
      - Light falloff accelerated at close distances

  - id: one_light_version
    description: Stripped to a single key light. Fill provided by reflector or wall bounce. No rim.
    constraint_addressed: limited_gear
    typical_tradeoffs:
      - No rim/hair light separation — subject may merge with dark backgrounds
      - Fill dependent on reflector placement or room bounce
      - Less control over contrast ratio
      - Simpler to set up but less polished result

  - id: two_light_version
    description: Key plus one additional light (fill or rim). Most common practical setup for working photographers.
    constraint_addressed: limited_gear
    typical_tradeoffs:
      - Must choose between dedicated fill light or rim light
      - Use reflector for the missing role
      - No background light — gradient or separation from background must come from existing lights

  - id: portable_version
    description: Modified for location work. All battery-powered, collapsible modifiers, minimal stands.
    constraint_addressed: portable_required
    typical_tradeoffs:
      - Lower power output limits working aperture
      - Collapsible modifiers less rigid — may not hold shape outdoors
      - Battery life limits shoot duration
      - Recycle time may be slower on battery power

  - id: speedlight_version
    description: All lights replaced with speedlights. Maximum portability, minimum power.
    constraint_addressed: battery_required
    typical_tradeoffs:
      - Significantly lower power — wider apertures or higher ISO needed
      - Slower recycle time at full power
      - Smaller light source — modifiers must compensate for harder base quality
      - Multiple speedlights can approximate a single strobe

  - id: led_version
    description: All lights replaced with continuous LED sources. WYSIWYG preview, no flash sync concerns.
    constraint_addressed: continuous_light_preferred
    typical_tradeoffs:
      - Lower output than flash — higher ISO or wider aperture often needed
      - 60Hz flicker possible at fast shutter speeds
      - Heat buildup with high-output LEDs in enclosed modifiers
      - Color accuracy varies by LED quality — CRI 95+ recommended

  - id: no_boom_version
    description: Modified for setups without a boom arm. Key on a regular stand, repositioned accordingly.
    constraint_addressed: no_boom_available
    typical_tradeoffs:
      - Cannot center key above camera for butterfly/clamshell — light stand will be in frame
      - Key placed slightly to one side (15-20 degrees) as compromise
      - Resulting pattern shifts from butterfly toward loop
      - C-stand with arm can substitute for dedicated boom
