version: "1.0"
subject_types:
  people:
    - id: male_portrait
      description: Adult male headshot or portrait. Broader jaw and facial structure. Often benefits from more contrast.
      lighting_considerations:
        - Stronger shadows add character — Rembrandt and loop work well
        - Broad lighting can emphasize jaw width; use short lighting to slim
        - Skin texture visible; beauty dish adds dimensionality
      common_failures: [face_too_flat, no_subject_separation]

    - id: female_portrait
      description: Adult female headshot or portrait. Often aims for softer, more flattering light.
      lighting_considerations:
        - Softer light generally preferred — large modifiers, loop or butterfly patterns
        - Under-eye fill important for clamshell/beauty setups
        - Feathering key past the subject reduces forehead hot spots
      common_failures: [face_too_flat, catchlight_too_high, nose_shadow_too_long]

    - id: mature_skin
      description: Older subjects with visible skin texture, wrinkles, and age lines.
      lighting_considerations:
        - Large, soft sources minimize texture visibility
        - Frontal or near-frontal key reduces shadow in wrinkles
        - Avoid side lighting which accentuates every line
        - Higher fill ratio (smaller key-to-fill gap) is more flattering
      common_failures: [shadow_too_hard, face_too_flat]

    - id: glossy_beauty
      description: Beauty photography emphasizing skin sheen, makeup, and cosmetic detail.
      lighting_considerations:
        - Beauty dish or large octa preferred for signature catchlight
        - Clamshell fill critical for under-eye and chin shadow control
        - Must control highlight placement precisely — feathering is key
        - Skin prep and moisturizer affect specular response
      common_failures: [catchlight_too_high, double_catchlights, face_too_flat]

    - id: dark_skin
      description: Subjects with dark (Fitzpatrick V-VI) skin tones requiring high-CRI sources and careful exposure.
      lighting_considerations:
        - CRI 95+ sources essential to reveal undertone richness
        - Large, soft modifiers prevent harsh shadow transitions
        - Expose for skin highlights, not incident meter
        - Silver reflector for fill provides stronger bounce than white
        - Increase fill ratio by 0.5 stop vs standard setup
      common_failures: [shadow_too_hard, no_subject_separation, face_too_flat]

    - id: glasses
      description: Subjects wearing glasses. Reflections and glare are primary concerns.
      lighting_considerations:
        - Avoid butterfly/clamshell — overhead centered key guarantees glare
        - Loop lighting preferred — raise key 6 inches above normal
        - Angle subject chin down 5 degrees to redirect reflection
        - Move key 5 degrees wider if glare persists
        - Matte/anti-reflective lens coatings help but don't eliminate the problem
      common_failures: [catchlight_too_high, face_too_flat]

    - id: full_body_fashion
      description: Full-length fashion photography showing entire body and outfit.
      lighting_considerations:
        - Large source needed for even head-to-toe illumination
        - Multiple lights often required for fill and edge separation
        - Strip boxes from behind for body edge definition
        - Background lighting critical for full-body framing
      common_failures: [no_subject_separation, shadow_too_hard]

    - id: seated_portrait
      description: Subject seated — chair, stool, or floor. Changes light geometry relative to standing subject.
      lighting_considerations:
        - Key height needs adjustment — standard standing key may be too high
        - Clamshell fill (reflector on lap) becomes natural in seated position
        - Background relationships change with lower camera position
      common_failures: [raccoon_eyes, catchlight_too_high]

    - id: group_portrait
      description: Multiple subjects in one frame. Consistency across the group is the priority.
      lighting_considerations:
        - Largest, softest modifier available for even coverage
        - High-CRI sources essential when group has varied skin tones
        - Position darker-skinned subjects slightly closer to the light
        - Umbrella or large octa preferred over directional modifiers
        - Fill ratio should be higher (less contrast) for group uniformity
      common_failures: [face_too_flat, no_subject_separation]

  product:
    - id: matte_product
      description: Non-reflective products (textiles, paper, matte packaging). Diffuse reflection only.
      lighting_considerations:
        - Angle and position of source define shadow shape
        - Texture revealed by raking light at shallow angles
        - Soft overhead light for catalog shots
      common_failures: [shadow_too_hard]

    - id: reflective_product
      description: Shiny, non-transparent products (metal, glossy plastic, polished wood).
      lighting_considerations:
        - Reflection family of angle must be controlled
        - Strip lights for controlled highlight lines
        - Large sources for broad, even reflections
        - Angle of incidence = angle of reflection is the governing physics
      common_failures: [reflection_too_broad, reflection_too_narrow]

    - id: glass_product
      description: Transparent glass objects (bottles, jars, stemware).
      lighting_considerations:
        - Dark-field or light-field technique depending on background
        - Never light glass from front — light from behind or beside
        - Black cards for edge definition on light-field
        - White cards for edge definition on dark-field
      common_failures: [reflection_too_broad, reflection_too_narrow]

    - id: jewelry
      description: Small, highly detailed metallic and gemstone products.
      lighting_considerations:
        - Very small, controlled light sources
        - Light tents or wrap diffusion for even illumination
        - Specular highlights define metal quality — position carefully
        - Macro lens often needed, increasing light requirements
      common_failures: [reflection_too_broad, shadow_too_hard]

    - id: food
      description: Food photography emphasizing texture, freshness, and appetite appeal.
      lighting_considerations:
        - Backlight or side-backlight at 10-2 o'clock creates appetite appeal
        - Soft overhead creates a natural daylight feel
        - Fill from front to open shadows without killing texture
        - Steam and condensation require fast shooting once plated
      common_failures: [shadow_too_hard, face_too_flat]

    - id: fabric
      description: Textile products requiring accurate color and texture representation.
      lighting_considerations:
        - Cross-lighting reveals weave texture
        - Neutral, high-CRI sources essential for color accuracy
        - Large, even sources for flat-lay photography
        - Avoid specular highlights that mask texture
      common_failures: [reflection_too_broad, shadow_too_hard]
