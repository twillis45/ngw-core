identity:
  setup_id: caravaggio_chiaroscuro_v1
  setup_name: Caravaggio Chiaroscuro
  use_case: portrait
  visual_intent: low_key
  pattern_family: side_key
  tags:
    - low_key
    - cinematic
    - dramatic
    - single_light
    - fine_art
    - chiaroscuro

subject_fit:
  subject_types:
    - male_portrait
    - female_portrait
    - seated_portrait
  skin_or_surface_notes:
    - increase_key_power_for_dark_skin_luminance
    - consider_subtle_fill_at_3_plus_stops_for_shadow_detail_on_dark_skin
    - hard_light_accentuates_every_texture
    - precise_exposure_critical_to_avoid_crushed_shadows
  pose_assumptions:
    - turned_30_to_45_degrees_toward_key
    - or_looking_away_from_key_for_mystery
    - minimal_movement

environment_fit:
  minimum_ceiling_height_ft: 9
  recommended_ceiling_height_ft: 10
  minimum_room_width_ft: 10
  minimum_room_depth_ft: 18
  indoor_outdoor_fit:
    - indoor
    - studio
  portability: low
  power_requirements: medium
  environment_tags:
    - tall_ceiling
    - large_studio
    - limited_width

light_architecture:
  key_source:
    role: key
    modifier_family: grid_spot
    angle_deg: 60
    height_relative_to_subject: above_forehead_angled_steeply_down
    distance_ft:
      min: 4.0
      max: 6.0
    feather_direction: aimed_directly_at_subject
  fill_source: null
  rim_sources: []
  background_source: null
  negative_fill:
    role: negative_fill
    position: both_sides_of_subject
    notes: black_v_flats_to_prevent_bounce_fill
  bounce: null

camera_architecture:
  lens_range_mm:
    min: 85
    max: 135
  camera_height_relative_to_subject: at_or_slightly_below_eye_level
  camera_angle: straight_on_or_slight_upward
  camera_distance_ft:
    min: 8
    max: 12

distance_references:
  key_to_subject_ft:
    min: 4.0
    max: 6.0
  fill_to_subject_ft: null
  rim_to_subject_ft: null
  subject_to_background_ft:
    min: 8
    max: 12
  camera_to_subject_ft:
    min: 8
    max: 12
  background_light_to_background_ft: null

expected_result:
  shadow_pattern: half_or_more_of_face_in_deep_shadow
  contrast_profile: very_high
  catchlight_style: single_small_defined_in_key_side_eye_only
  background_relationship: pure_or_near_pure_black
  visual_notes:
    - sharp_shadow_edges_from_hard_source
    - visible_texture_and_dimension_in_lit_areas
    - shadow_side_of_face_merges_with_background
    - strong_highlight_to_shadow_ratio_4_1_to_8_1

diagnostics:
  common_failure_modes:
    - no_subject_separation
    - shadow_too_hard
    - background_too_bright
    - face_too_flat

substitutions:
  modifier_alternatives:
    - primary: grid_spot
      alternatives:
        - bare_bulb
        - fresnel
  gear_alternatives:
    - primary: strobe_mono
      alternatives:
        - fresnel
        - speedlight
  adaptation_variants:
    - ideal_setup
    - small_room_version
    - one_light_version
    - speedlight_version

reliability:
  rule_confidence: 78
  reliability_label: reliable
  field_verified: false
  verification_count: 0
  notes:
    - highly_reliable_when_room_is_properly_controlled
    - main_risk_is_ambient_contamination
    - dark_environments_perform_best
    - requires_v_flats_or_dark_walls_to_prevent_bounce_fill
