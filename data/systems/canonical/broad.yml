id: broad
name: Broad Lighting
version: 1
status: canonical

pattern:
  primary: broad
  secondary: loop

category: classic
difficulty: 1
setup_time_minutes: 8

environment:
  required: studio
  ceiling_height_min_ft: 8
  background: any
  background_distance_ft: 5

subject:
  distance_from_camera_ft: 6
  position: center

camera:
  height: eye_level
  lens: 85-135mm
  angle_to_subject_deg: 0

capture_settings:
  iso: 100
  aperture: f/5.6-f/8
  shutter: 1/160
  white_balance: flash
  notes:
    - Meter the broad (camera-facing) cheek for correct exposure on the lit side
    - f/8 gives safe DOF for subjects who may shift position between frames

lights:
  - role: key
    modifier: softbox_rect
    angle_deg: 30
    height: above_eye_level
    height_offset_in: 10
    distance_ft: 5
    power_ratio: 1.0
    notes:
      - Key illuminates the camera-facing side of the face
      - Subject turns AWAY from key light (nose toward shadow side)
      - Creates wider-looking face — use for slender faces
      - Angle is relative to camera, not subject nose

  - role: fill
    modifier: reflector
    angle_deg: -30
    height: eye_level
    height_offset_in: 0
    distance_ft: 5
    power_ratio: 0.25
    notes:
      - Gentle fill opens shadow side without losing dimension
      - White reflector preferred for natural look
      - Ratio typically 2:1 to 3:1

shadow_signature:
  expected_pattern: loop
  nose_shadow: small_loop
  cheek_shadow: minimal
  contrast: medium
  softness: 0.65

failure_modes:
  - "Subject turns toward key: becomes short lighting instead"
  - "Key too far to side: nose shadow crosses cheek (becomes Rembrandt)"
  - "Too much fill: face goes flat, loses all shaping"
  - "Key too low: unflattering under-eye shadows"

substitutions:
  - if_missing: softbox_rect
    use: umbrella_white
    tradeoff: "Broader, softer light; less directional control"
  - if_missing: reflector
    use: softbox_rect
    tradeoff: "More controlled fill; watch for double shadows"

use_cases:
  - corporate_headshot
  - portrait
  - yearbook
  - commercial

example_photographers:
  - Peter Hurley (sometimes)
  - Commercial headshot photographers
