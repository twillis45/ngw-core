id: clamshell
name: Beauty Clamshell
version: 1
status: canonical

pattern:
  primary: clamshell
  secondary: null

category: beauty
difficulty: 2
setup_time_minutes: 10

environment:
  required: studio
  ceiling_height_min_ft: 8
  background: any
  background_distance_ft: 6

subject:
  distance_from_camera_ft: 6
  position: center

camera:
  height: eye_level
  lens: 85-135mm
  angle_to_subject_deg: 0

lights:
  - role: key
    modifier: beauty_dish
    angle_deg: 0
    height: above_forehead
    height_offset_in: 12
    distance_ft: 4
    power_ratio: 1.0
    notes:
      - Centered directly above lens axis
      - Feather slightly forward to wrap across face
      - Sock diffuser optional for softer shadow edges

  - role: fill
    modifier: reflector
    angle_deg: 0
    height: below_chin
    height_offset_in: -12
    distance_ft: 3
    power_ratio: 0.5
    notes:
      - Silver reflector or white bounce below chin
      - Controls under-eye shadow depth
      - Move closer for flatter light

shadow_signature:
  expected_pattern: clamshell
  nose_shadow: directly_below
  cheek_shadow: minimal
  contrast: low
  softness: 0.7

failure_modes:
  - "Key too high: deep eye socket shadows"
  - "Fill too bright: kills all dimension"
  - "Subject too far from key: uneven falloff across face"

substitutions:
  - if_missing: beauty_dish
    use: softbox_octa
    tradeoff: "Softer edges, less punch; larger catchlights"
  - if_missing: reflector
    use: white_foam_core
    tradeoff: "Less efficient but effective at close range"

use_cases:
  - beauty
  - headshot
  - social_media
  - cosmetics
  - skin_care

example_photographers:
  - Peter Hurley
  - Lindsay Adler
