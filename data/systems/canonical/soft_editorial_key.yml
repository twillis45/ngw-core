id: soft_editorial_key
name: Soft Editorial Key
version: 1
status: canonical

pattern:
  primary: soft_editorial_key
  secondary: loop

category: editorial
difficulty: 2
setup_time_minutes: 10

environment:
  required: studio
  ceiling_height_min_ft: 9
  background: any
  background_distance_ft: 8

subject:
  distance_from_camera_ft: 8
  position: center

camera:
  height: eye_level
  lens: 85-135mm
  angle_to_subject_deg: 0

lights:
  - role: key
    modifier: softbox_octa
    size: large
    angle_deg: 35
    height: above_eye_level
    height_offset_in: 12
    distance_ft: 4
    power_ratio: 1.0
    notes:
      - Large octa close to subject for maximum wrap
      - Feather past face for even falloff
      - The closer the source the softer the light

  - role: fill
    modifier: v_flat_white
    angle_deg: -35
    height: eye_level
    height_offset_in: 0
    distance_ft: 3
    power_ratio: 0.0
    notes:
      - White v-flat bounces ambient spill
      - No power needed, passive fill
      - Controls shadow ratio naturally

shadow_signature:
  expected_pattern: loop
  nose_shadow: small_loop
  cheek_shadow: moderate
  contrast: medium
  softness: 0.65

failure_modes:
  - "Source too far: light hardens, loses editorial quality"
  - "Source too high: deep unflattering eye shadows"
  - "No v-flat: shadow side may go too dark"

substitutions:
  - if_missing: softbox_octa
    use: parabolic_umbrella
    tradeoff: "Slightly less control but beautiful wrap quality"
  - if_missing: v_flat_white
    use: reflector
    tradeoff: "More targeted fill, less natural"

use_cases:
  - editorial
  - fashion
  - magazine
  - catalog_premium

example_photographers:
  - Peter Lindbergh
  - Steven Meisel
