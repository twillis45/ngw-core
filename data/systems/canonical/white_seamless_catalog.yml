id: white_seamless_catalog
name: White Seamless Catalog
version: 1
status: canonical

pattern:
  primary: high_key
  secondary: flat_fashion

category: commercial
difficulty: 3
setup_time_minutes: 15

environment:
  required: studio
  ceiling_height_min_ft: 9
  background: white_seamless
  background_distance_ft: 8

subject:
  distance_from_camera_ft: 8
  position: center

camera:
  height: eye_level
  lens: 85-135mm
  angle_to_subject_deg: 0

capture_settings:
  iso: 100
  aperture: f/11
  shutter: 1/160
  white_balance: flash
  notes:
    - Small aperture ensures edge-to-edge sharpness for catalog/e-commerce requirements
    - Meter face and background separately; background should read 1.5-2 stops above key

lights:
  - role: key
    modifier: softbox_rect
    angle_deg: 25
    height: above_eye_level
    height_offset_in: 10
    distance_ft: 5
    power_ratio: 1.0
    notes:
      - Large softbox gives even coverage
      - Feather across subject for gradual falloff
      - Meter face at key ratio

  - role: fill
    modifier: softbox_rect
    angle_deg: -25
    height: eye_level
    height_offset_in: 0
    distance_ft: 6
    power_ratio: 0.5
    notes:
      - Brings shadow side within 1 stop of key
      - Keeps detail visible for e-commerce requirements
      - Can use reflector instead if limited gear

  - role: background_left
    modifier: bare_reflector
    angle_deg: 160
    height: mid_height
    height_offset_in: 0
    distance_ft: 4
    power_ratio: 1.5
    notes:
      - Blast background 1.5-2 stops above key
      - Must be even across entire seamless
      - Position 45 degrees behind subject on left

  - role: background_right
    modifier: bare_reflector
    angle_deg: -160
    height: mid_height
    height_offset_in: 0
    distance_ft: 4
    power_ratio: 1.5
    notes:
      - Matches left background light for even coverage
      - Combined should read pure white (250+ RGB)
      - Flag off subject to prevent lens flare

shadow_signature:
  expected_pattern: high_key
  nose_shadow: minimal
  cheek_shadow: minimal
  contrast: very_low
  softness: 0.8

failure_modes:
  - "Background lights too close to subject: wraps around edges"
  - "Background uneven: visible gradient behind subject"
  - "Key/fill ratio too flat: no dimension, looks amateur"

substitutions:
  - if_missing: softbox_rect
    use: umbrella_white
    tradeoff: "More spill; may need flags to control"
  - if_missing: bare_reflector
    use: any_strobe
    tradeoff: "Just needs to be bright and even on background"

use_cases:
  - e_commerce
  - catalog
  - amazon_product
  - white_background

example_photographers:
  - Terry Richardson
  - Commercial catalog studios
