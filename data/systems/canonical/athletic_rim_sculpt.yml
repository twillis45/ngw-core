id: athletic_rim_sculpt
name: Athletic Rim Sculpt
version: 1
status: canonical

pattern:
  primary: athletic_rim_sculpt
  secondary: rim_only

category: athletic
difficulty: 3
setup_time_minutes: 15

environment:
  required: studio
  ceiling_height_min_ft: 10
  background: dark
  background_distance_ft: 10

subject:
  distance_from_camera_ft: 8
  position: center

camera:
  height: slightly_low
  lens: 70-200mm
  angle_to_subject_deg: -5

lights:
  - role: rim
    modifier: stripbox
    angle_deg: 150
    height: above_head
    height_offset_in: 20
    distance_ft: 8
    power_ratio: 1.0
    notes:
      - Primary sculpting light from behind
      - Grid essential for control
      - Creates strong edge definition on muscles

  - role: kicker
    modifier: stripbox
    angle_deg: -150
    height: above_head
    height_offset_in: 20
    distance_ft: 8
    power_ratio: 0.8
    notes:
      - Symmetric edge opposite rim
      - Creates dual-edge separation
      - Slightly less power to avoid symmetry

  - role: key
    modifier: softbox_rect
    angle_deg: 20
    height: above_eye_level
    height_offset_in: 12
    distance_ft: 7
    power_ratio: 0.5
    notes:
      - Low power key opens the face
      - Do not overpower the rim lights
      - Subject should look powerful, not flat

shadow_signature:
  expected_pattern: rim
  nose_shadow: minimal
  cheek_shadow: moderate
  contrast: high
  softness: 0.3

failure_modes:
  - "Key too bright: kills the athletic edge-lit look"
  - "Rim lights spilling onto background: flags needed"
  - "Camera angle too high: loses heroic perspective"

substitutions:
  - if_missing: stripbox
    use: barndoor_reflector
    tradeoff: "Harder edges, less wrap; can work for athletic"

use_cases:
  - athletic_portrait
  - fitness
  - sports_marketing
  - gym_promo

example_photographers:
  - Walter Iooss Jr
  - Tim Tadder
