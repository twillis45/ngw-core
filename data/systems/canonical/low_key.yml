id: low_key
name: Low Key Lighting
version: 1
status: canonical

pattern:
  primary: low_key
  secondary: rembrandt

category: dramatic
difficulty: 2
setup_time_minutes: 12

environment:
  required: studio
  ceiling_height_min_ft: 8
  background: dark
  background_distance_ft: 8

subject:
  distance_from_camera_ft: 7
  position: center

camera:
  height: eye_level
  lens: 85-135mm
  angle_to_subject_deg: 0

capture_settings:
  iso: 100
  aperture: f/5.6-f/8
  shutter: 1/160
  white_balance: flash
  notes:
    - Meter for highlights only and let shadows fall to black naturally
    - Sync speed at 1/160 eliminates ambient so the background stays dark

lights:
  - role: key
    modifier: grid_spot
    angle_deg: 45
    height: above_eye_level
    height_offset_in: 16
    distance_ft: 5
    power_ratio: 1.0
    notes:
      - Grid controls spill to prevent background illumination
      - Position at 30-60 degrees for Rembrandt or loop shadow
      - Feather away from background to keep it dark

  - role: fill
    modifier: negative_fill
    angle_deg: -45
    height: eye_level
    height_offset_in: 0
    distance_ft: 3
    power_ratio: 0.0
    notes:
      - Black v-flat absorbs all bounce on shadow side
      - Critical for maintaining dark mood
      - Without negative fill, room bounce destroys the low-key effect

shadow_signature:
  expected_pattern: rembrandt
  nose_shadow: opposite_key
  cheek_shadow: strong
  contrast: high
  softness: 0.30

failure_modes:
  - "Background not dark enough: move subject further from BG or flag key spill"
  - "Too much room bounce: add negative fill, flag walls, use smaller modifier"
  - "Subject overexposed: reduce key power or increase distance"
  - "Skin looks harsh: feather key slightly or add minimal fill at -3 stops"

substitutions:
  - if_missing: grid_spot
    use: beauty_dish
    tradeoff: "Wider spill — must flag background more aggressively"
  - if_missing: grid_spot
    use: fresnel
    tradeoff: "Hard, cinematic light; barndoors help contain spill"
  - if_missing: negative_fill
    use: black_fabric
    tradeoff: "Any non-reflective black surface works"

use_cases:
  - dramatic_portrait
  - fine_art
  - film_noir_style
  - character_study
  - moody_headshot

example_photographers:
  - Yousuf Karsh
  - Caravaggio (painting reference)
  - Gregory Heisler
