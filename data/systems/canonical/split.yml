id: split
name: Split Lighting
version: 1
status: canonical

pattern:
  primary: split
  secondary: null

category: dramatic
difficulty: 2
setup_time_minutes: 8

environment:
  required: studio
  ceiling_height_min_ft: 8
  background: dark_preferred
  background_distance_ft: 6

subject:
  distance_from_camera_ft: 6
  position: center

camera:
  height: eye_level
  lens: 85-135mm
  angle_to_subject_deg: 0

capture_settings:
  iso: 100
  aperture: f/5.6-f/8
  shutter: 1/160
  white_balance: flash
  notes:
    - Meter the shadow side to decide how much detail to retain in the dark half
    - f/5.6 adds dramatic shallow DOF; f/8 for sharper overall rendering

lights:
  - role: key
    modifier: beauty_dish
    angle_deg: 90
    height: eye_level
    height_offset_in: 2
    distance_ft: 4
    power_ratio: 1.0
    notes:
      - Key at 90 degrees — exactly perpendicular to camera-subject axis
      - Eye-level or just above for clean vertical split
      - Grid recommended for tighter control and harder edge

  - role: fill
    modifier: negative_fill
    angle_deg: -90
    height: eye_level
    height_offset_in: 0
    distance_ft: 3
    power_ratio: 0.0
    notes:
      - V-flat on shadow side absorbs bounce and deepens shadow
      - No active fill — the drama is in the darkness
      - Optional subtle bounce at -3 stops if shadow detail needed

shadow_signature:
  expected_pattern: split
  nose_shadow: perpendicular
  cheek_shadow: strong
  contrast: high
  softness: 0.30

failure_modes:
  - "Key not at true 90°: becomes Rembrandt or loop instead of split"
  - "Room bounce fills shadow side: add negative fill (black v-flat)"
  - "Subject turns toward key: lit area expands, loses split effect"
  - "Key too high: eye socket goes dark on lit side"

substitutions:
  - if_missing: beauty_dish
    use: grid_spot
    tradeoff: "Harder edge, more specular; increase distance slightly"
  - if_missing: beauty_dish
    use: softbox_rect
    tradeoff: "Softer split line; less dramatic but more forgiving"
  - if_missing: negative_fill
    use: reflector
    tradeoff: "Fills shadow side — use only if intentional (reduces drama)"

use_cases:
  - dramatic_portrait
  - editorial
  - fine_art
  - film_noir_style
  - character_study

example_photographers:
  - Irving Penn
  - Gregory Heisler
