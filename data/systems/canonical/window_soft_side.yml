id: window_soft_side
name: Window Soft Side Light
version: 1
status: canonical

pattern:
  primary: window_portrait
  secondary: null

category: natural
difficulty: 1
setup_time_minutes: 5

environment:
  required: window_light
  ceiling_height_min_ft: 8
  background: any
  background_distance_ft: 4

subject:
  distance_from_camera_ft: 5
  distance_from_window_ft: 3
  position: near_window

camera:
  height: eye_level
  lens: 50-85mm
  angle_to_subject_deg: 0

capture_settings:
  iso: 400-800
  aperture: f/2.8-f/4
  shutter: 1/125
  white_balance: daylight
  notes:
    - Higher ISO compensates for lower ambient light; match WB to window color temp
    - Wide aperture helps separate subject from background in available-light shooting

lights:
  - role: key
    modifier: natural_window
    angle_deg: 60
    height: window_height
    height_offset_in: 0
    distance_ft: 3
    power_ratio: 1.0
    notes:
      - Turn subject toward window for broad light
      - Turn away from window for short/narrow light
      - Sheer curtain acts as giant diffuser
      - North-facing windows give most consistent light

  - role: fill
    modifier: reflector
    angle_deg: -60
    height: face_height
    height_offset_in: 0
    distance_ft: 3
    power_ratio: 0.3
    notes:
      - White reflector board on shadow side
      - Move closer for more fill
      - Silver reflector optional for punchier look

shadow_signature:
  expected_pattern: window_portrait
  nose_shadow: soft_directional
  cheek_shadow: moderate
  contrast: medium
  softness: 0.65

failure_modes:
  - "Direct sun through window: harsh, uncontrollable"
  - "Subject too far from window: flat, underexposed"
  - "Background too bright: blown out, distracting"

substitutions:
  - if_missing: reflector
    use: white_foam_core
    tradeoff: "Same effect, just position carefully"
  - if_missing: natural_window
    use: large_softbox
    tradeoff: "Can simulate window light in studio; place at 60 degrees"

use_cases:
  - portrait
  - engagement
  - boudoir
  - lifestyle
  - maternity

example_photographers:
  - Sue Bryce
  - Elizabeth Messina
