id: dramatic-rembrandt-rim
name: Dramatic Rembrandt (Key + Rim)
pack: pro
rank: 3

taxonomy-refs:
  mood: dramatic
  environment: studio
  gear-profile: strobe-mono
  modifier-family: beauty-dish

shadow:
  expected:
    pattern: rembrandt
    notes:
      - Triangle of light on shadow cheek.
      - Stronger cheekbone definition.

diagram-defaults:
  subject:
    position: center
  camera:
    angle: eye-level
    lens: short-tele

lights:
  - role: key
    name: Key
    angle-deg: 55.0
    distance-ft: "5–8"
    height: above eye line
    modifier: beauty dish + grid
    notes:
      - Push to 45–60° for true Rembrandt triangle.

  - role: rim
    name: Rim
    angle-deg: -140.0
    distance-ft: "6–10"
    height: head height or slightly above
    modifier: stripbox + grid
    notes:
      - Edge separation; keep off the nose.
