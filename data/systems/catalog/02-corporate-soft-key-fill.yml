id: corporate-soft-key-fill
name: Corporate Headshot (Soft Key + Gentle Fill)
pack: pro
rank: 2

taxonomy-refs:
  mood: corporate
  environment: studio
  gear-profile: strobe-mono
  modifier-family: softbox

shadow:
  expected:
    pattern: loop
    notes:
      - Small loop shadow; clean, professional.
      - Avoid hard nose shadow / raccoon eyes.

diagram-defaults:
  subject:
    position: center
  camera:
    angle: eye-level
    lens: short-tele

lights:
  - role: key
    name: Key
    angle-deg: 35.0
    distance-ft: "4–7"
    height: slightly above eye line
    modifier: large softbox
    notes:
      - 30–45° off-axis, feather across face.

  - role: fill
    name: Fill
    angle-deg: -20.0
    distance-ft: "5–8"
    height: near eye line
    modifier: reflector / umbrella (low power)
    notes:
      - Just enough to lift shadows 1–2 stops.
