<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Log In — NGW</title>
  <link rel="stylesheet" href="/www/css/marketing.css"/>
</head>
<body>

<!-- ── Nav ──────────────────────────────────────────── -->
<nav class="nav">
  <div class="container nav__inner">
    <a href="/" class="nav__brand">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="4" width="40" height="40" rx="12" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M18 14 L24 34 L30 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="24" cy="14" r="3" fill="currentColor"/>
      </svg>
      NGW
    </a>
    <ul class="nav__links">
      <li><a href="/features">Features</a></li>
      <li><a href="/pricing">Pricing</a></li>
      <li><a href="/library">Library</a></li>
      <li><a href="/blog">Blog</a></li>
    </ul>
    <div class="nav__cta">
      <a href="/signup" class="btn btn--primary" style="padding:8px 16px;font-size:.8125rem">Get Started</a>
    </div>
    <button class="nav__hamburger" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav__mobile">
    <a href="/features">Features</a>
    <a href="/pricing">Pricing</a>
    <a href="/library">Library</a>
    <a href="/blog">Blog</a>
    <a href="/signup" class="btn btn--primary" style="text-align:center">Get Started</a>
  </div>
</nav>

<!-- ── Login Form ──────────────────────────────────── -->
<main class="auth">
  <div class="auth__card">
    <h1>Welcome back</h1>
    <p>Log in to your NGW account</p>

    <form id="loginForm">
      <div class="auth__field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="auth__field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password"/>
      </div>
      <div id="loginError" style="color:#ff6b6b;font-size:.875rem;margin-bottom:12px;display:none"></div>
      <button type="submit" class="btn btn--primary" id="loginBtn">Log In</button>
    </form>

    <div class="auth__footer">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>
</main>

<script src="/www/js/marketing.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    localStorage.setItem('ngw_auth_token', data.token);
    localStorage.setItem('ngw_auth_user', JSON.stringify(data.user));
    window.location.href = '/ui';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
});
</script>
</body>
</html>
