<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign Up — No Guesswork Lighting</title>
  <meta name="description" content="Create your free No Guesswork Lighting account. Get 3 free lighting analyses — upload a photo, get the complete setup in seconds."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/www/css/marketing.css"/>
</head>
<body>

<!-- ── Nav ──────────────────────────────────────────── -->
<nav class="nav">
  <div class="container nav__inner">
    <a href="/" class="nav__brand">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="4" width="40" height="40" rx="12" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M18 14 L24 34 L30 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="24" cy="14" r="3" fill="currentColor"/>
      </svg>
      NGW
    </a>
    <ul class="nav__links">
      <li><a href="/features">Features</a></li>
      <li><a href="/pricing">Pricing</a></li>
      <li><a href="/library">Library</a></li>
      <li><a href="/blog">Blog</a></li>
    </ul>
    <div class="nav__cta">
      <a href="/login" class="btn btn--ghost" style="padding:8px 16px;font-size:.875rem">Log In</a>
    </div>
    <button class="nav__hamburger" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav__mobile">
    <a href="/features">Features</a>
    <a href="/pricing">Pricing</a>
    <a href="/library">Library</a>
    <a href="/blog">Blog</a>
    <a href="/login" class="btn btn--ghost" style="margin-top:8px;text-align:center">Log In</a>
  </div>
</nav>

<!-- ── Signup Form ─────────────────────────────────── -->
<main class="auth">
  <div class="auth__card">
    <div style="text-align:center;margin-bottom:14px">
      <svg width="36" height="36" viewBox="0 0 48 48" fill="none" style="margin:0 auto 8px">
        <rect x="4" y="4" width="40" height="40" rx="12" stroke="var(--accent, #849eb8)" stroke-width="2" fill="none"/>
        <path d="M18 14 L24 34 L30 14" stroke="var(--accent, #849eb8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="24" cy="14" r="3" fill="var(--accent, #849eb8)"/>
      </svg>
    </div>
    <h1>Create your account</h1>
    <p>3 free analyses included. No credit card required.</p>

    <!-- Social sign-up -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
      <button type="button" class="btn btn--ghost" id="googleSignUp" style="width:100%;font-size:.875rem;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:10px">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 0 0 0 12c0 1.94.46 3.77 1.28 5.4l3.56-2.77.01-.54z" fill="#FBBC05"/><path d="M12 4.75c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 1.09 14.97 0 12 0 7.7 0 3.99 2.47 2.18 6.07l3.66 2.84c.87-2.6 3.3-4.16 6.16-4.16z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>
      <button type="button" class="btn btn--ghost" id="appleSignUp" style="width:100%;font-size:.875rem;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:10px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Sign up with Apple
      </button>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="flex:1;height:1px;background:var(--border, rgba(132,158,184,0.08))"></div>
      <span style="font-size:.75rem;color:var(--text-dim, #9ca3af);letter-spacing:0.06em;font-weight:600">or use email</span>
      <div style="flex:1;height:1px;background:var(--border, rgba(132,158,184,0.08))"></div>
    </div>

    <form id="signupForm">
      <div class="auth__field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name"/>
      </div>
      <div class="auth__field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="auth__field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="6 characters minimum" required autocomplete="new-password" minlength="6"/>
      </div>
      <div id="signupError" style="color:var(--error, #f87171);font-size:.875rem;margin-bottom:12px;display:none"></div>
      <button type="submit" class="btn btn--primary" id="signupBtn">Create Account</button>
    </form>

    <div class="auth__footer" style="margin-top:16px">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</main>

<!-- ── Footer ──────────────────────────────────────── -->
<footer class="footer">
  <div class="container">
    <div class="footer__bottom" style="border-top:none;margin-top:0;padding-top:0">&copy; 2026 No Guesswork Lighting. All rights reserved.</div>
  </div>
</footer>

<script src="/www/js/marketing.js"></script>
<script>
document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('signupBtn');
  var errEl = document.getElementById('signupError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  try {
    var res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        username: document.getElementById('name').value,
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');
    localStorage.setItem('ngw_auth_token', data.token);
    localStorage.setItem('ngw_auth_user', JSON.stringify(data.user));
    window.location.href = '/ui';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});

/* Google Sign-Up — same flow as login (creates account if new) */
document.getElementById('googleSignUp').addEventListener('click', function() {
  if (window._gsiLoaded) { window._gsiPrompt(); return; }
  var script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = function() {
    window._gsiLoaded = true;
    google.accounts.id.initialize({
      client_id: window.__NGW_GOOGLE_CLIENT_ID || '',
      callback: async function(response) {
        try {
          var res = await fetch('/api/auth/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ credential: response.credential })
          });
          var data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Google sign-up failed');
          localStorage.setItem('ngw_auth_token', data.token);
          localStorage.setItem('ngw_auth_user', JSON.stringify(data.user));
          window.location.href = '/ui';
        } catch (err) {
          document.getElementById('signupError').textContent = err.message;
          document.getElementById('signupError').style.display = 'block';
        }
      }
    });
    window._gsiPrompt = function() { google.accounts.id.prompt(); };
    window._gsiPrompt();
  };
  script.onerror = function() {
    document.getElementById('signupError').textContent = 'Google Sign-In is not available. Please use email.';
    document.getElementById('signupError').style.display = 'block';
  };
  document.head.appendChild(script);
});

/* Apple Sign-Up — placeholder */
document.getElementById('appleSignUp').addEventListener('click', function() {
  document.getElementById('signupError').textContent = 'Apple Sign-In coming soon. Please use email or Google for now.';
  document.getElementById('signupError').style.display = 'block';
});
</script>
</body>
</html>
