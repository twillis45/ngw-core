<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f172a" />
  <title>NGW Core</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.01em; }
    .header .badge {
      font-size: 0.6875rem; font-weight: 600;
      background: var(--accent); color: #fff;
      padding: 2px 8px; border-radius: 999px;
    }

    /* Main layout */
    .main { padding: 16px; padding-bottom: calc(16px + var(--safe-bottom)); max-width: 600px; margin: 0 auto; }

    /* Sections */
    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 8px;
    }

    /* Card */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .card + .card { margin-top: 12px; }

    /* System cards */
    .system-card { position: relative; }
    .system-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .system-label { font-size: 0.875rem; font-weight: 600; }
    .btn-remove {
      background: none; border: none; color: var(--danger);
      font-size: 1.25rem; cursor: pointer; padding: 4px; line-height: 1;
      border-radius: 6px; transition: background 0.15s;
    }
    .btn-remove:hover { background: rgba(239,68,68,0.15); }

    /* Form fields */
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block; font-size: 0.75rem; font-weight: 500;
      color: var(--text-dim); margin-bottom: 4px;
    }
    .field input, .field select {
      width: 100%; padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.9375rem;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .field input::placeholder { color: var(--text-dim); opacity: 0.6; }

    /* Grid for criteria */
    .criteria-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* Toggle row for features */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 0.875rem; }

    /* iOS-style toggle */
    .toggle {
      position: relative; width: 44px; height: 26px;
      background: var(--surface-2); border-radius: 13px;
      cursor: pointer; transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute;
      top: 3px; left: 3px; width: 20px; height: 20px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(18px); }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 14px; border: none; border-radius: var(--radius);
      font-size: 0.9375rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: var(--surface-2); color: var(--text); }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .result-banner {
      padding: 16px; border-radius: var(--radius);
      text-align: center; margin-bottom: 16px;
    }
    .result-banner.win { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
    .result-banner .winner-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
    .result-banner .winner-score { font-size: 2rem; font-weight: 800; color: var(--success); }
    .result-banner .winner-conf { font-size: 0.8125rem; color: var(--text-dim); margin-top: 4px; }

    /* Score bar */
    .score-bar-wrap { margin: 8px 0; }
    .score-bar-label {
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px;
    }
    .score-bar {
      height: 8px; background: var(--surface-2); border-radius: 4px; overflow: hidden;
    }
    .score-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.6s ease;
    }

    /* Pick card */
    .pick-card { padding: 14px; }
    .pick-rank {
      display: inline-block; font-size: 0.6875rem; font-weight: 700;
      background: var(--accent); color: #fff;
      padding: 2px 8px; border-radius: 999px; margin-bottom: 8px;
    }
    .pick-rank.alt { background: var(--surface-2); color: var(--text-dim); }
    .pick-name { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .pick-reason { font-size: 0.8125rem; color: var(--text-dim); }

    /* Diagram canvas */
    .diagram-wrap {
      background: var(--bg); border-radius: 8px; padding: 8px;
      display: flex; justify-content: center;
    }
    canvas#diagram { width: 100%; max-width: 340px; aspect-ratio: 1; }

    /* Confidence breakdown */
    .conf-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .conf-row:last-child { border-bottom: none; }
    .conf-label { color: var(--text-dim); }
    .conf-val { font-weight: 600; }

    /* Error */
    .error-box {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius); padding: 14px;
      font-size: 0.875rem; color: var(--danger);
    }

    /* Hidden */
    .hidden { display: none !important; }

    /* Desktop tweaks */
    @media (min-width: 640px) {
      .main { padding: 24px; }
      .criteria-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>NGW Core</h1>
  <span class="badge">v1.0</span>
</div>

<div class="main">

  <!-- INPUT SECTION -->
  <div id="input-section">
    <div class="section">
      <div class="section-title">Lighting Systems</div>
      <div id="systems-list"></div>
      <div style="margin-top:12px">
        <button class="btn btn-secondary" onclick="addSystem()" style="width:100%">+ Add System</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Context</div>
      <div class="card">
        <div class="field">
          <label>Mood</label>
          <select id="ctx-mood">
            <option value="corporate">Corporate</option>
            <option value="beauty">Beauty</option>
            <option value="cinematic">Cinematic</option>
            <option value="editorial">Editorial</option>
            <option value="natural">Natural</option>
            <option value="high_key">High Key</option>
            <option value="low_key">Low Key</option>
          </select>
        </div>
        <div class="field">
          <label>Modifiers Available</label>
          <input id="ctx-modifiers" type="text" placeholder="softbox, umbrella, grid_spot" />
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button id="btn-recommend" class="btn btn-primary" onclick="runRecommend()">
        Get Recommendation
      </button>
    </div>
  </div>

  <!-- RESULTS SECTION -->
  <div id="results-section" class="hidden">
    <div id="result-error" class="error-box hidden"></div>

    <div id="result-content">
      <div id="result-banner" class="result-banner win"></div>

      <div class="section">
        <div class="section-title">Top Picks</div>
        <div id="picks-list"></div>
      </div>

      <div class="section">
        <div class="section-title">Lighting Diagram</div>
        <div class="card">
          <div class="diagram-wrap">
            <canvas id="diagram" width="340" height="340"></canvas>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Confidence Breakdown</div>
        <div id="conf-breakdown" class="card"></div>
      </div>

      <div class="section">
        <div class="section-title">Score Components</div>
        <div id="score-components" class="card"></div>
      </div>
    </div>

    <div style="margin-top:20px">
      <button class="btn btn-secondary" onclick="backToInput()" style="width:100%">Back to Input</button>
    </div>
  </div>

</div>

<script>
// ── State ──
let systemCounter = 0;
const systems = [];

function createSystemData() {
  return {
    id: '',
    name: '',
    criteria: { brightness: 5000, color_accuracy: 85, portability: 50, battery_life: 50, energy_efficiency: 50 },
    features: { dimmable: false, smart_ready: false, battery: false, waterproof: false },
    modifier: '',
    taxonomy_refs: {},
  };
}

// ── Render Systems ──
function addSystem() {
  const sys = createSystemData();
  const idx = systemCounter++;
  sys._idx = idx;
  systems.push(sys);
  renderSystems();
}

function removeSystem(idx) {
  const i = systems.findIndex(s => s._idx === idx);
  if (i !== -1) systems.splice(i, 1);
  renderSystems();
}

function renderSystems() {
  const wrap = document.getElementById('systems-list');
  wrap.innerHTML = '';
  systems.forEach((sys, i) => {
    const card = document.createElement('div');
    card.className = 'card system-card';
    card.innerHTML = buildSystemHTML(sys, i);
    wrap.appendChild(card);
    bindSystemEvents(card, sys);
  });
}

function buildSystemHTML(sys, i) {
  const num = i + 1;
  return `
    <div class="system-header">
      <span class="system-label">System ${num}</span>
      ${systems.length > 1 ? `<button class="btn-remove" onclick="removeSystem(${sys._idx})" aria-label="Remove">&times;</button>` : ''}
    </div>
    <div class="field">
      <label>ID</label>
      <input type="text" data-field="id" value="${esc(sys.id)}" placeholder="e.g. led-panel-a" />
    </div>
    <div class="field">
      <label>Name</label>
      <input type="text" data-field="name" value="${esc(sys.name)}" placeholder="e.g. ProLight LED" />
    </div>
    <div class="section-title" style="margin-top:12px">Criteria</div>
    <div class="criteria-grid">
      ${critField('brightness', sys.criteria.brightness, '0-10000')}
      ${critField('color_accuracy', sys.criteria.color_accuracy, '0-100')}
      ${critField('portability', sys.criteria.portability, '0-100')}
      ${critField('battery_life', sys.criteria.battery_life, '0-100')}
      ${critField('energy_efficiency', sys.criteria.energy_efficiency, '0-200')}
    </div>
    <div class="section-title" style="margin-top:12px">Features</div>
    ${featToggle('dimmable', sys.features.dimmable)}
    ${featToggle('smart_ready', sys.features.smart_ready)}
    ${featToggle('battery', sys.features.battery)}
    ${featToggle('waterproof', sys.features.waterproof)}
    <div class="field" style="margin-top:12px">
      <label>Modifier (multiplier, leave blank for fallback)</label>
      <input type="text" data-field="modifier" value="${sys.modifier}" placeholder="e.g. 1.05" inputmode="decimal" />
    </div>
  `;
}

function critField(name, val, range) {
  const label = name.replace(/_/g, ' ');
  return `<div class="field">
    <label>${label}</label>
    <input type="number" data-crit="${name}" value="${val}" placeholder="${range}" inputmode="numeric" />
  </div>`;
}

function featToggle(name, on) {
  const label = name.replace(/_/g, ' ');
  return `<div class="toggle-row">
    <span class="toggle-label">${label}</span>
    <div class="toggle ${on ? 'on' : ''}" data-feat="${name}"></div>
  </div>`;
}

function bindSystemEvents(card, sys) {
  card.querySelectorAll('input[data-field]').forEach(input => {
    input.addEventListener('input', () => { sys[input.dataset.field] = input.value; });
  });
  card.querySelectorAll('input[data-crit]').forEach(input => {
    input.addEventListener('input', () => { sys.criteria[input.dataset.crit] = parseFloat(input.value) || 0; });
  });
  card.querySelectorAll('.toggle[data-feat]').forEach(toggle => {
    toggle.addEventListener('click', () => {
      const feat = toggle.dataset.feat;
      sys.features[feat] = !sys.features[feat];
      toggle.classList.toggle('on', sys.features[feat]);
    });
  });
}

function esc(s) { return String(s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

// ── Run Recommendation ──
async function runRecommend() {
  const btn = document.getElementById('btn-recommend');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analyzing...';

  // Build payload
  const payload = {
    systems: systems.map((s, i) => {
      const out = {
        id: s.id || `system-${i + 1}`,
        name: s.name || `System ${i + 1}`,
        criteria: { ...s.criteria },
        features: { ...s.features },
        taxonomy_refs: { mood: document.getElementById('ctx-mood').value },
      };
      const mod = parseFloat(s.modifier);
      if (!isNaN(mod)) out.modifier = mod;
      return out;
    }),
    input: { mood: document.getElementById('ctx-mood').value },
    metadata: {},
    modifiers_available: document.getElementById('ctx-modifiers').value
      .split(',').map(s => s.trim()).filter(Boolean),
  };

  try {
    const resp = await fetch('/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(JSON.stringify(err.detail || err, null, 2));
    }

    const data = await resp.json();
    showResults(data);
  } catch (e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Get Recommendation';
  }
}

// ── Display Results ──
function showResults(data) {
  document.getElementById('input-section').classList.add('hidden');
  document.getElementById('results-section').classList.remove('hidden');
  document.getElementById('result-error').classList.add('hidden');
  document.getElementById('result-content').classList.remove('hidden');

  const sel = data.result.structured.selection;
  const winner = sel.winner;
  const picks = sel.top_picks;
  const conf = winner.confidence;

  // Banner
  const banner = document.getElementById('result-banner');
  banner.innerHTML = `
    <div class="winner-name">${esc(winner.system_name || winner.system_id)}</div>
    <div class="winner-score">${winner.final_score.toFixed(1)}</div>
    <div class="winner-conf">Confidence: ${conf.score.toFixed(1)} / 100</div>
  `;

  // Picks
  const picksList = document.getElementById('picks-list');
  picksList.innerHTML = '';
  picks.forEach((p, i) => {
    const bd = p.breakdown;
    const score = bd.final_score;
    const pct = Math.min(100, score);
    const color = i === 0 ? 'var(--success)' : 'var(--accent)';
    picksList.innerHTML += `
      <div class="card pick-card">
        <span class="pick-rank ${i > 0 ? 'alt' : ''}">${i === 0 ? 'Winner' : 'Alt #' + (i + 1)}</span>
        <div class="pick-name">${esc(bd.system_name || bd.system_id)}</div>
        <div class="score-bar-wrap">
          <div class="score-bar-label"><span>Score</span><span>${score.toFixed(1)}</span></div>
          <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
        <div class="pick-reason">${esc(p.reason)}</div>
      </div>
    `;
  });

  // Confidence breakdown
  const confBox = document.getElementById('conf-breakdown');
  const reasons = conf.reasons || [];
  confBox.innerHTML = reasons.map(r =>
    `<div class="conf-row"><span class="conf-label">${esc(r)}</span></div>`
  ).join('');

  // Score components (from winner)
  const winnerBd = picks[0].breakdown;
  const comps = winnerBd.components || [];
  const bonuses = winnerBd.feature_bonuses || [];
  const scBox = document.getElementById('score-components');
  let scHTML = '';
  comps.forEach(c => {
    scHTML += `<div class="conf-row">
      <span class="conf-label">${esc(c.criterion)}</span>
      <span class="conf-val">${c.weighted.toFixed(2)} <small style="color:var(--text-dim)">(${c.normalised.toFixed(0)} &times; ${c.weight})</small></span>
    </div>`;
  });
  if (bonuses.length) {
    scHTML += `<div class="conf-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:8px">
      <span class="conf-label" style="font-weight:600">Feature Bonuses</span><span></span></div>`;
    bonuses.forEach(b => {
      scHTML += `<div class="conf-row">
        <span class="conf-label">${esc(b.feature)}</span>
        <span class="conf-val">+${b.points.toFixed(1)}</span>
      </div>`;
    });
  }
  scHTML += `<div class="conf-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:8px">
    <span class="conf-label" style="font-weight:600">Base Score</span>
    <span class="conf-val">${winnerBd.base_score.toFixed(2)}</span>
  </div>`;
  scHTML += `<div class="conf-row">
    <span class="conf-label" style="font-weight:600">Modifier</span>
    <span class="conf-val">&times; ${winnerBd.modifier.toFixed(3)}</span>
  </div>`;
  scHTML += `<div class="conf-row">
    <span class="conf-label" style="font-weight:700;color:var(--text)">Final Score</span>
    <span class="conf-val" style="color:var(--success);font-size:1rem">${winnerBd.final_score.toFixed(2)}</span>
  </div>`;
  scBox.innerHTML = scHTML;

  // Diagram
  drawDiagram(data.result.diagram_spec);
}

function showError(msg) {
  document.getElementById('input-section').classList.add('hidden');
  document.getElementById('results-section').classList.remove('hidden');
  document.getElementById('result-content').classList.add('hidden');
  const errBox = document.getElementById('result-error');
  errBox.classList.remove('hidden');
  errBox.textContent = msg;
}

function backToInput() {
  document.getElementById('input-section').classList.remove('hidden');
  document.getElementById('results-section').classList.add('hidden');
}

// ── Diagram Renderer ──
function drawDiagram(spec) {
  const canvas = document.getElementById('diagram');
  const dpr = window.devicePixelRatio || 1;
  const size = 340;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, size, size);

  const cx = size / 2, cy = size / 2;
  const scale = 60; // px per meter

  // Grid
  ctx.strokeStyle = 'rgba(71,85,105,0.3)';
  ctx.lineWidth = 1;
  for (let r = 1; r <= 3; r++) {
    ctx.beginPath();
    ctx.arc(cx, cy, r * scale, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Subject
  ctx.fillStyle = '#f1f5f9';
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'var(--text-dim)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Subject', cx, cy + 22);

  // Camera
  const cam = spec.camera || {};
  const camX = cx + (cam.x || 0) * scale;
  const camY = cy + (cam.y || -2) * scale;
  ctx.fillStyle = '#94a3b8';
  ctx.fillRect(camX - 8, camY - 5, 16, 10);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px sans-serif';
  ctx.fillText('Cam', camX, camY + 18);

  // Lights
  const colors = { key: '#f59e0b', fill: '#3b82f6', rim: '#a855f7' };
  (spec.lights || []).forEach(light => {
    const angle = (light.angle_deg - 90) * Math.PI / 180;
    const dist = light.distance_m * scale;
    const lx = cx + Math.cos(angle) * dist;
    const ly = cy + Math.sin(angle) * dist;

    // Beam line
    ctx.strokeStyle = colors[light.role] || '#fff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(cx, cy);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Light marker
    ctx.fillStyle = colors[light.role] || '#fff';
    ctx.beginPath();
    ctx.arc(lx, ly, 7, 0, Math.PI * 2);
    ctx.fill();

    // Label
    ctx.fillStyle = '#f1f5f9';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    const labelY = ly > cy ? ly + 16 : ly - 12;
    ctx.fillText(light.label || light.role, lx, labelY);

    // Modifier
    if (light.modifier) {
      ctx.fillStyle = 'var(--text-dim)';
      ctx.font = '9px sans-serif';
      const modY = ly > cy ? ly + 26 : ly - 2;
      ctx.fillText(light.modifier.replace(/_/g, ' '), lx, modY);
    }
  });
}

// ── Init ──
addSystem();
</script>
</body>
</html>
